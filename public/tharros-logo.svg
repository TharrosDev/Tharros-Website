<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 160 40" fill="none">
  <!-- Combined "Ti" Mark & Wordmark -->
  <g id="tharros-combined-logo">
    <!-- Icon Part (Based on Ti Mark) -->
    <g transform="translate(0, 4)">
      <rect x="2" y="2" width="24" height="4" fill="#0f172a"/>
      <path d="M16 6L10 24H5L11 6H16Z" fill="#0f172a"/>
      <mask id="nav-dot-mask">
        <path d="M22 6L16 24H11L17 6H22Z" fill="white"/>
        <circle cx="18.5" cy="15" r="2.5" fill="black"/>
      </mask>
      <path d="M22 6L16 24H11L17 6H22Z" fill="#0f172a" mask="url(#nav-dot-mask)"/>
    </g>

    <!-- Typography -->
    <text x="36" y="27" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#0f172a" letter-spacing="-0.05em">THARROS</text>
    
    <!-- Signature Underline -->
    <rect x="36" y="32" width="100" height="2" rx="0" fill="#e23b2f" opacity="1"/>
  </g>
</svg>
